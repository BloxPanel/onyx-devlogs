name: Update GitHub Pages Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install markdown

      - name: Generate script safely
        run: |
          mkdir -p docs

          echo 'import markdown' > generate.py
          echo '' >> generate.py

          echo 'release_body = """${{ github.event.release.body }}"""' >> generate.py
          echo 'tag = """${{ github.event.release.tag_name }}"""' >> generate.py

          echo '' >> generate.py

          echo 'html_body = markdown.markdown(release_body)' >> generate.py

          echo '' >> generate.py

          echo 'html = f"""' >> generate.py
          echo '<!DOCTYPE html>' >> generate.py
          echo '<html>' >> generate.py
          echo '<head>' >> generate.py
          echo '<meta charset="UTF-8">' >> generate.py
          echo '<meta name="viewport" content="width=device-width, initial-scale=1.0">' >> generate.py
          echo '<title>Bot Changelog</title>' >> generate.py

          echo '<style>' >> generate.py
          echo 'body { background:#0d0d0d; color:#e6e6e6; font-family: Arial; padding:40px; }' >> generate.py
          echo 'a { color:#4da3ff; }' >> generate.py
          echo 'code { background:#111; padding:2px 5px; border-radius:4px; }' >> generate.py
          echo 'pre { background:#111; padding:15px; border-radius:8px; overflow-x:auto; }' >> generate.py
          echo 'h1,h2,h3 { color:white; }' >> generate.py
          echo '</style>' >> generate.py

          echo '</head>' >> generate.py
          echo '<body>' >> generate.py

          echo '<h1>🚀 Bot Changelog</h1>' >> generate.py
          echo '<h2>{tag} — Release Notes</h2>' >> generate.py

          echo '{html_body}' >> generate.py

          echo '</body>' >> generate.py
          echo '</html>' >> generate.py

          echo '"""' >> generate.py

          echo 'with open("docs/index.html", "w", encoding="utf-8") as f:' >> generate.py
          echo '    f.write(html)' >> generate.py

      - name: Run generator
        run: python3 generate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/index.html
          git commit -m "docs: update changelog for ${{ github.event.release.tag_name }}" || exit 0
          git push origin HEAD:main