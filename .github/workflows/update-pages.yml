name: Update GitHub Pages Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from release
        run: |
          mkdir -p docs

          python3 - << 'EOF'
          import os
          import markdown

          release_body = """${{ github.event.release.body }}"""

          html_body = markdown.markdown(release_body)

          with open("docs/index.html", "w") as f:
              f.write("""
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Bot Changelog</title>

          <style>
          body {
              background:#0d0d0d;
              color:#e6e6e6;
              font-family: Arial, sans-serif;
              padding:40px;
          }
          a { color:#4da3ff; }
          code {
              background:#111;
              padding:2px 5px;
              border-radius:4px;
          }
          pre {
              background:#111;
              padding:15px;
              border-radius:8px;
              overflow-x:auto;
          }
          h1, h2, h3 {
              color:white;
          }
          </style>

          </head>
          <body>

          <h1>🚀 Bot Changelog</h1>
          <h2>${{ github.event.release.tag_name }} — Release Notes</h2>

          """ + html_body + """

          </body>
          </html>
          """)
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/index.html

          git commit -m "docs: update changelog for ${{ github.event.release.tag_name }}" || exit 0

          git push origin HEAD:main