name: Update GitHub Pages Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from release
        run: |
          mkdir -p docs

          echo "<!DOCTYPE html>" > docs/index.html
          echo "<html lang='en'>" >> docs/index.html
          echo "<head>" >> docs/index.html
          echo "<meta charset='UTF-8'>" >> docs/index.html
          echo "<meta name='viewport' content='width=device-width, initial-scale=1.0'>" >> docs/index.html
          echo "<title>Bot Changelog</title>" >> docs/index.html

          # DARK MODE FIX
          echo "<style>" >> docs/index.html
          echo "body { background:#0d0d0d; color:#e6e6e6; font-family:Arial; padding:40px; }" >> docs/index.html
          echo "pre { background:#111; padding:15px; border-radius:8px; overflow-x:auto; }" >> docs/index.html
          echo "h1, h2 { color:#ffffff; }" >> docs/index.html
          echo "</style>" >> docs/index.html

          echo "</head><body>" >> docs/index.html

          echo "<h1>🚀 Bot Changelog</h1>" >> docs/index.html
          echo "<h2>${{ github.event.release.tag_name }} — Release Notes</h2>" >> docs/index.html

          echo "<pre>" >> docs/index.html
          echo "${{ github.event.release.body }}" >> docs/index.html
          echo "</pre>" >> docs/index.html

          echo "</body></html>" >> docs/index.html

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/index.html

          git commit -m "docs: update changelog for ${{ github.event.release.tag_name }}" || exit 0

          git push origin HEAD:main