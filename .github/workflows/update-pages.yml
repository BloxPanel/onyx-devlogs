name: Update GitHub Pages Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from release
        run: |
          mkdir -p docs

          cat <<EOF > docs/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Bot Changelog</title>
            <link rel="stylesheet" href="style.css">
          </head>

          <body>
            <h1>🚀 Bot Changelog</h1>

            <h2>${{ github.event.release.tag_name }} — Release Notes</h2>

            <pre style="white-space: pre-wrap; background:#111; padding:15px; border-radius:8px;">
          ${{ github.event.release.body }}
            </pre>
          </body>
          </html>
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/index.html

          git commit -m "docs: update changelog for ${{ github.event.release.tag_name }}" || exit 0

          git push origin HEAD:main